runtime:
  snapshots_enabled: true
  snapshots_path: data/processed/snapshots.jsonl
  source: helius_dexscreener
  log_level: INFO
  debug_features: false
  debug_limit: 500
birdeye:
  chain: solana
  poll_seconds: 3
  debug: false
  enrich_overview: true
  enrich_min_liquidity_usd: 5
  enrich_sleep_seconds: 0.1
  enrich_timeout_seconds: 8
dexscreener:
  chain: solana
  poll_seconds: 20
  profiles_limit: 500
  timeout_seconds: 15
  seen_path: data/processed/seen_dexscreener.json
  max_new_tokens_per_poll: 60
  per_pair_sleep_seconds: 0.25
  debug: true
helius_dexscreener:
  chain: solana
  rpc_base: https://mainnet.helius-rpc.com
  rpc_timeout_seconds: 20
  poll_seconds: 1.5
  signatures_limit: 200
  max_txs_per_poll: 140
  max_new_mints_per_poll: 120
  discovery_state_path: data/processed/helius_discovery_state.json
  pumpfun_program_id: 6EF8rrecthR5Dkzon8Nwu78hRvfCKubJ14M5uBEwF6P
  raydium_amm_v4_program_id: 675kPX9MHTjS2zt1qfr1NYHuzeLXfQM9H24wFSUt1Mp8
  ignore_mints:
  - So11111111111111111111111111111111111111112
  - EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v
  - Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB
  dexscreener_timeout_seconds: 15
  seen_path: data/processed/seen_dexscreener.json
  per_pair_sleep_seconds: 0.25
  debug: false
  max_signatures_per_poll: 600
  programs:
    pumpfun_program_id: 6EF8rrecthR5Dkzon8Nwu78hRvfCKubJ14M5uBEwF6P
    raydium_amm_v4_program_id: disabled
enrichment:
  helius:
    enabled: true
    rpc_base: https://api-mainnet.helius-rpc.com
    timeout_seconds: 20
filter:
  min_liquidity_usd: 5
  min_age_minutes: 0
sources:
  dexscreener_profiles_enabled: false
ml:
  enabled: true
  model_path: models/tabular/scorer_lgbm.pkl
  horizon_min: 60
  return_threshold: 0.2
  score_threshold: 0.55
  feature_cols:
  - liquidity_usd
  - volume_h24_usd
  - trade_h24
  - price_change_h24
  - age_minutes
  - last_trade_minutes
  - market_cap_usd
  - fdv_usd
  - holders
  - unique_wallet_h24
